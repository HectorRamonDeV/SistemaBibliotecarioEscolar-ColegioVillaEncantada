<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - CVE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="text-center shadow-lg p-5 bg-white rounded border-top border-danger border-5" style="max-width: 500px;">
        <div class="mb-4">
            <img th:src="@{/img/logo-CVE.png}" alt="Logo Colegio" width="80">
        </div>
        <h1 class="display-1 text-danger fw-bold mb-0">403</h1>
        <h2 class="fw-bold mb-3" style="color: #1b2f4a;">¡Acceso Denegado!</h2>
        <p class="text-muted mb-4 px-3">
            Lo sentimos, no tienes los permisos necesarios para explorar esta sección de la biblioteca. Si crees que
            esto es un error, contacta con administración.
        </p>

        <a th:href="@{/dashboard}" class="btn btn-danger fw-bold px-4 py-2 rounded-pill">
            Volver a mi panel seguro
        </a>
    </div>

</body>

</html>
