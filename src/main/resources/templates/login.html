<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <!-- CDN Booostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Ruta Css -->
    <link rel="stylesheet" th:href="@{/styles.css}">
    <!-- CDN Tipografia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="login-container">
        <section class="login-card">
            <div class="header-card text-center">
                <a th:href="@{/}" class="btn-atras text-decoration-none text-center">ATRAS</a>
            </div>
            <div class="login-info">
                <img th:src="@{/img/logo-CVE.png}" alt="Logo Colegio" class="logo-login">
                <h1 class="text-light">Sistema <br> Bibliotecario</h1>
                <p class="text-light opacity-75">Accede con tus credenciales a tu perfil</p>
            </div>

            <form th:action="@{/login}" method="post" class="login-form needs-validation" novalidate>
                <div th:if="${param.error}" class="alert alert-danger text-center"
                    style="background-color: #f8d7da; color: #842029; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;">
                    Credenciales incorrectas.
                </div>
                <div th:if="${param.logout}" class="alert alert-success text-center"
                    style="background-color: #d1e7dd; color: #0f5132; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;">
                    Has cerrado sesión exitosamente.
                </div>

                <div class="input-group">
                    <label for="codigo">Código Institucional</label>
                    <input type="text" id="codigo" name="username" placeholder="Ej: A12345678"
                        pattern="[A-Za-z][0-9]{8}" maxlength="9" required>
                    <div class="invalid-feedback">
                        Por favor, ingresa un código válido (1 letra y 8 números).
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                    <div class="invalid-feedback">
                        La contraseña es obligatoria.
                    </div>
                </div>

                <button type="submit" class="btn-iniciar">INICIAR SESIÓN</button>
            </form>
        </section>
    </main>
</body>

</html>
